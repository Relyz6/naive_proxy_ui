<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Checking connection...</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
            }

            body {
                height: 100vh;
                background: linear-gradient(135deg, #0f172a, #1e293b);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #cbd5e1;
            }

            .container {
                text-align: center;
                animation: fadeIn 1s ease;
            }

            .logo {
                font-size: 20px;
                letter-spacing: 3px;
                margin-bottom: 30px;
                color: #94a3b8;
            }

            .spinner {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-top-color: #38bdf8;
                animation: spin 0.8s linear infinite;
                margin: 0 auto 25px;
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
            }

            .text {
                font-size: 14px;
                letter-spacing: 2px;
                margin-bottom: 10px;
            }

            .sub {
                font-size: 12px;
                color: #64748b;
            }

            .progress {
                margin-top: 30px;
                width: 200px;
                height: 4px;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                overflow: hidden;
                margin-left: auto;
                margin-right: auto;
            }

            .bar {
                width: 0%;
                height: 100%;
                background: #38bdf8;
                animation: load 4s infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes load {
                0% {
                    width: 0%;
                }
                50% {
                    width: 70%;
                }
                100% {
                    width: 100%;
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="logo">SECURE CONNECT</div>

            <div class="spinner"></div>

            <div class="text">Checking your browser...</div>
            <div class="sub">Establishing secure connection</div>

            <div class="progress">
                <div class="bar"></div>
            </div>
        </div>
    </body>
</html>
